name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions: {}

jobs:
  verify-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Verify Cargo and npm versions match tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)

          NPM_VERSION=$(node --eval "process.stdout.write(JSON.parse(require('fs').readFileSync('./packages/sentinel-check/package.json','utf8')).version)")

          echo "Cargo: $CARGO_VERSION  npm: $NPM_VERSION  tag: $TAG"
          test "$TAG" = "$CARGO_VERSION" || { echo "Cargo.toml version mismatch"; exit 1; }
          test "$TAG" = "$NPM_VERSION"   || { echo "package.json version mismatch"; exit 1; }

          echo "version=v$TAG" >> "$GITHUB_OUTPUT"

  build-binaries:
    needs: verify-versions
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: sentinel-linux-x64
            binary_name: sentinel
          - os: macos-14
            target: x86_64-apple-darwin
            asset_name: sentinel-darwin-x64
            binary_name: sentinel
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: sentinel-darwin-arm64
            binary_name: sentinel
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: sentinel-windows-x64.exe
            binary_name: sentinel.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  publish-release:
    needs:
      - verify-versions
      - validate-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: release-artifacts

      - name: Assemble release files and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find release-artifacts -type f -maxdepth 2 -exec cp {} dist/ \;
          pushd dist >/dev/null
          sha256sum sentinel-* > checksums.txt
          popd >/dev/null

      - name: Sign checksums with EC private key
        shell: bash
        env:
          SENTINEL_SIGNING_KEY: ${{ secrets.SENTINEL_SIGNING_KEY }}
        run: |
          set -euo pipefail
          echo "$SENTINEL_SIGNING_KEY" > /tmp/signing_key.pem
          openssl dgst -sha256 -sign /tmp/signing_key.pem -out dist/checksums.txt.sig dist/checksums.txt
          rm -f /tmp/signing_key.pem

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ needs.verify-versions.outputs.version }}
          files: |
            dist/sentinel-*
            dist/checksums.txt
            dist/checksums.txt.sig

  validate-binaries:
    needs:
      - verify-versions
      - build-binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: sentinel-linux-x64
            smoke_mode: full
          - os: macos-14
            asset: sentinel-darwin-arm64
            smoke_mode: full
          - os: macos-14
            asset: sentinel-darwin-x64
            smoke_mode: x64-check
          - os: windows-latest
            asset: sentinel-windows-x64.exe
            smoke_mode: windows
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ${{ matrix.asset }}
          path: .

      - name: Make executable
        if: runner.os != 'Windows'
        run: chmod +x ./${{ matrix.asset }}

      - name: Version smoke test
        shell: bash
        run: ./${{ matrix.asset }} --version

      - name: Functional smoke test (Unix)
        if: runner.os != 'Windows' && matrix.smoke_mode == 'full'
        shell: bash
        run: |
          set -euo pipefail

          run_sentinel_release_validation() {
            local output
            set +e
            output="$("$@" 2>&1)"
            local exit_code=$?
            set -e

            if [ $exit_code -eq 0 ]; then
              printf '%s\n' "$output"
              return 0
            fi

            printf '%s\n' "$output"

            if printf '%s' "$output" | grep -Eiq "ProvenanceMissing|provenance not available" && \
              ! printf '%s' "$output" | grep -Eiq "Compromised|compromised"; then
              echo "[release] allowing ProvenanceMissing-only validation result"
              return 0
            fi

            return $exit_code
          }

          mkdir -p testapp && cd testapp
          npm init -y >/dev/null
          npm install lodash express >/dev/null
          BIN="$GITHUB_WORKSPACE/${{ matrix.asset }}"
          SENTINEL_NPM_VERSION="$(npm view sentinel-check version)"
          run_sentinel_release_validation "$BIN" check --cwd "$(pwd)" --format text
          run_sentinel_release_validation "$BIN" check --cwd "$(pwd)" --format json > ../check.json
          grep -q "sentinel_version" ../check.json
          run_sentinel_release_validation "$BIN" check --cwd "$(pwd)" --format github
          run_sentinel_release_validation "$BIN" check --cwd "$(pwd)" --format junit > ../check.junit
          grep -q "testsuite" ../check.junit

          run_sentinel_release_validation "$BIN" ci --cwd "$(pwd)" --dry-run --format text
          run_sentinel_release_validation "$BIN" ci --cwd "$(pwd)" --dry-run --format json --report ../r.json > ../ci.json
          grep -q "sentinel_version" ../ci.json
          test -f ../r.json
          run_sentinel_release_validation "$BIN" ci --cwd "$(pwd)" --dry-run --format github
          run_sentinel_release_validation "$BIN" ci --cwd "$(pwd)" --dry-run --format junit > ../ci.junit
          grep -q "testsuite" ../ci.junit

          run_sentinel_release_validation "$BIN" install "sentinel-check@${SENTINEL_NPM_VERSION}" --cwd "$(pwd)" --dry-run --format text

          run_sentinel_release_validation "$BIN" ci --cwd "$(pwd)" --dry-run --format text

          run_sentinel_release_validation "$BIN" ci --cwd "$(pwd)" --dry-run --allow-scripts --format text
          echo "[${{ matrix.asset }}] all checks passed"

      - name: Validate darwin x64 artifact
        if: matrix.smoke_mode == 'x64-check'
        shell: bash
        run: |
          set -euo pipefail
          file "./${{ matrix.asset }}" | grep -q "x86_64"
          echo "[${{ matrix.asset }}] x64 artifact detected"

      - name: Functional smoke test (Windows)
        if: matrix.smoke_mode == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          function Invoke-SentinelReleaseValidation {
            param(
              [Parameter(ValueFromRemainingArguments = $true)]
              [string[]]$CommandArgs
            )

            $oldPsNativeCommandPreference = $PSNativeCommandUseErrorActionPreference
            $PSNativeCommandUseErrorActionPreference = $false
            $result = & $bin @CommandArgs 2>&1
            $exitCode = $LASTEXITCODE
            $PSNativeCommandUseErrorActionPreference = $oldPsNativeCommandPreference
            $text = ($result | Out-String)
            Write-Host $text

            if ($exitCode -eq 0) {
              return $text
            }

            $hasProvenanceMissing = ($text -match "ProvenanceMissing") -or ($text -match "provenance not available")
            $hasCompromised = $text -match "Compromised"

            if ($hasProvenanceMissing -and -not $hasCompromised) {
              Write-Host "[release] allowing ProvenanceMissing-only validation result"
              return $text
            }

            throw "Sentinel validation failed with exit code $exitCode"
          }

          New-Item -ItemType Directory -Path testapp -Force | Out-Null
          Set-Location testapp
          npm init -y | Out-Null
          npm install lodash express | Out-Null

          $bin = Join-Path $env:GITHUB_WORKSPACE "${{ matrix.asset }}"

          Invoke-SentinelReleaseValidation "check" "--cwd" (Get-Location).Path "--format" "text"

          Invoke-SentinelReleaseValidation "ci" "--cwd" (Get-Location).Path "--dry-run" "--format" "text"

          Invoke-SentinelReleaseValidation "ci" "--cwd" (Get-Location).Path "--dry-run" "--format" "text"

          Invoke-SentinelReleaseValidation "ci" "--cwd" (Get-Location).Path "--dry-run" "--allow-scripts" "--format" "text"

          Write-Host "[${{ matrix.asset }}] binary validation passed"

  publish-npm:
    needs:
      - verify-versions
      - publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish sentinel-check wrapper with provenance
        run: npm publish --provenance --access public
        working-directory: packages/sentinel-check
