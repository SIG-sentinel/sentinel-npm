name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions: {}

jobs:
  verify-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Verify Cargo and npm versions match tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)

          NPM_VERSION=$(node --eval "process.stdout.write(JSON.parse(require('fs').readFileSync('./packages/sentinel-check/package.json','utf8')).version)")

          echo "Cargo: $CARGO_VERSION  npm: $NPM_VERSION  tag: $TAG"
          test "$TAG" = "$CARGO_VERSION" || { echo "Cargo.toml version mismatch"; exit 1; }
          test "$TAG" = "$NPM_VERSION"   || { echo "package.json version mismatch"; exit 1; }

          echo "version=v$TAG" >> "$GITHUB_OUTPUT"

  build-binaries:
    needs: verify-versions
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: sentinel-linux-x64
            binary_name: sentinel
          - os: macos-14
            target: x86_64-apple-darwin
            asset_name: sentinel-darwin-x64
            binary_name: sentinel
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: sentinel-darwin-arm64
            binary_name: sentinel
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: sentinel-windows-x64.exe
            binary_name: sentinel.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  publish-release:
    needs:
      - verify-versions
      - build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: release-artifacts

      - name: Assemble release files and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find release-artifacts -type f -maxdepth 2 -exec cp {} dist/ \;
          pushd dist >/dev/null
          sha256sum sentinel-* > checksums.txt
          popd >/dev/null

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ needs.verify-versions.outputs.version }}
          files: |
            dist/sentinel-*
            dist/checksums.txt

  validate-binaries:
    needs:
      - verify-versions
      - publish-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: sentinel-linux-x64
          - os: macos-14
            asset: sentinel-darwin-arm64
          - os: windows-latest
            asset: sentinel-windows-x64.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - name: Download release binary
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release download "${{ needs.verify-versions.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ matrix.asset }}" \
            --dir .

      - name: Make executable
        if: runner.os != 'Windows'
        run: chmod +x ./${{ matrix.asset }}

      - name: Version smoke test
        shell: bash
        run: ./${{ matrix.asset }} --version

      - name: Functional smoke test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p testapp && cd testapp
          npm init -y >/dev/null
          npm install lodash express >/dev/null
          BIN="$GITHUB_WORKSPACE/${{ matrix.asset }}"
          SENTINEL_NPM_VERSION="$(npm view sentinel-check version)"
          "$BIN" check --cwd "$(pwd)" --format text
          "$BIN" ci --cwd "$(pwd)" --dry-run --format text
          "$BIN" ci --cwd "$(pwd)" --dry-run --no-scripts --format json --report ../r.json > ../ci.json
          grep -q "sentinel_version" ../ci.json
          test -f ../r.json
          "$BIN" install "sentinel-check@${SENTINEL_NPM_VERSION}" --cwd "$(pwd)" --dry-run --format text
          echo "[${{ matrix.asset }}] all checks passed"

      - name: Functional smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path testapp -Force | Out-Null
          Set-Location testapp
          npm init -y | Out-Null
          npm install lodash express | Out-Null

          $bin = Join-Path $env:GITHUB_WORKSPACE "${{ matrix.asset }}"
          $sentinelNpmVersion = (npm view sentinel-check version).Trim()

          & $bin check --cwd (Get-Location).Path --format text
          & $bin ci --cwd (Get-Location).Path --dry-run --format text
          & $bin ci --cwd (Get-Location).Path --dry-run --no-scripts --format json --report ..\r.json > ..\ci.json

          if (-not (Select-String -Path ..\ci.json -Pattern "sentinel_version" -Quiet)) {
            throw "ci.json does not contain sentinel_version"
          }

          if (-not (Test-Path ..\r.json)) {
            throw "Expected report file ..\\r.json was not created"
          }

          & $bin install "sentinel-check@$sentinelNpmVersion" --cwd (Get-Location).Path --dry-run --format text
          Write-Host "[${{ matrix.asset }}] all checks passed"

  publish-npm:
    needs:
      - verify-versions
      - validate-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish sentinel-check wrapper with provenance
        run: npm publish --provenance --access public
        working-directory: packages/sentinel-check
